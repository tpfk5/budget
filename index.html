<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#cccccc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JOBLOG" />
  <title>JOBLOG</title>

  <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22JOBLOG%22%2C%22short_name%22%3A%22JOBLOG%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23cccccc%22%2C%22theme_color%22%3A%22%23cccccc%22%7D" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-56W2555NLE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-56W2555NLE');
  </script>

  <style>
    :root { --lime: #00ff00; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #cccccc; color: #111; font-family: 'Helvetica Neue', -apple-system, 'Apple SD Gothic Neo', 'Pretendard', sans-serif; overscroll-behavior: none; }

    /* ── 레이아웃 ── */
    #app { display: flex; flex-direction: column; height: 100dvh; }
    #header { background: #cccccc; border-bottom: 1px solid #999; padding: env(safe-area-inset-top, 12px) 16px 0; flex-shrink: 0; }
    #scroll-body { flex: 1; overflow-y: auto; padding: 12px 12px calc(env(safe-area-inset-bottom, 0px) + 12px); background: #c4c4c4; }

    /* ── 헤더 상단 ── */
    .header-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 14px; }
    .header-logo { font-size: 30px; font-weight: 700; letter-spacing: 0.1em; color: #111; line-height: 1; }
    .header-sub { font-size: 11px; letter-spacing: 0.14em; color: #666; margin-top: 4px; }

    /* ── ADD 버튼 ── */
    #btn-add {
      background: transparent;
      border: 1px solid #111;
      border-radius: 0;
      padding: 8px 15px;
      color: #111;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      font-family: inherit;
    }
    /* ✅ 수정: open 상태는 기본 검정 유지 */
    #btn-add.open { background: transparent; border-color: #111; color: #111; }
    /* ✅ 수정: 오타 #btn-: → #btn-add: / 누르는 순간만 라임 배경 */
    #btn-add:active { background: var(--lime); border-color: var(--lime); color: #111; }

    /* ── 월 탭 ── */
    .month-tabs { display: flex; overflow-x: auto; scrollbar-width: none; }
    .month-tabs::-webkit-scrollbar { display: none; }
    .month-btn {
      background: transparent; border: none; border-bottom: 2px solid transparent;
      color: #777; padding: 8px 13px; font-size: 12px; font-weight: 500;
      letter-spacing: 0.1em; cursor: pointer; white-space: nowrap;
      transition: color .15s, border-color .15s; font-family: inherit;
    }
    .month-btn.active { color: var(--lime); font-weight: 700; }

    /* ── 뷰 탭 ── */
    .tab-row { display: flex; border-top: 0.5px solid #aaa; margin-top: 2px; }
    .tab-btn {
      background: transparent; border: none; border-top: 2px solid transparent;
      color: #777; padding: 9px 14px; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; white-space: nowrap; font-weight: 500;
      transition: color .15s, border-color .15s; font-family: inherit;
    }
    .tab-btn.active { color: var(--lime); font-weight: 700; }

    /* ── 카드 공통 ── */
    .card { background: #cccccc; border-bottom: 0.5px solid #aaa; padding: 16px; margin-bottom: 1px; }
    .card:last-child { border-bottom: none; }
    .card-title { font-size: 11px; letter-spacing: 0.14em; color: #666; margin-bottom: 14px; }

    /* ── 예산 카드 ── */
    .budget-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .budget-label { font-size: 11px; letter-spacing: 0.12em; color: #666; margin-bottom: 5px; }
    .budget-amount { font-size: 26px; font-weight: 300; color: #111; }
    .remain-label { font-size: 11px; letter-spacing: 0.12em; color: #666; margin-bottom: 4px; text-align: right; }
    .remain-amount { font-size: 20px; font-weight: 500; text-align: right; color: #111; }
    .remain-amount.warn { color: #7a5200; }
    .remain-amount.over { color: #c00; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 11px; letter-spacing: 0.08em; color: #777; margin: 14px 0 6px; }
    .progress-bg { background: #aaa; height: 1px; }
    .progress-fill { height: 1px; background: #111; transition: width .5s ease; }
    .progress-fill.warn { background: #7a5200; }
    .progress-fill.over { background: #c00; }

    /* ── 카테고리 바 ── */
    .cat-row { margin-bottom: 13px; }
    .cat-meta { display: flex; justify-content: space-between; font-size: 12px; color: #111; margin-bottom: 5px; }
    .cat-limit { color: #777; font-size: 11px; }
    .cat-limit.danger { color: #c00; }
    .cat-bar-bg { background: #aaa; height: 1px; }
    .cat-bar-fill { height: 1px; background: #111; transition: width .4s ease; }
    .cat-bar-fill.warn { background: #7a5200; }
    .cat-bar-fill.over { background: #c00; }

    /* ── 입력 폼 ── */
    #form-wrap { background: #cccccc; border-bottom: 1px solid #aaa; padding: 18px; margin-bottom: 1px; animation: slideDown .2s ease; }
    #form-wrap h2 { font-size: 12px; letter-spacing: 0.16em; font-weight: 700; color: #111; margin-bottom: 14px; }
    .form-grid { display: flex; flex-direction: column; gap: 9px; }
    .form-row { display: flex; gap: 8px; }
    /* ✅ 수정: checkbox 제외 */
    input:not([type="checkbox"]), select {
      background: #bbb; border: 0.5px solid #999; border-radius: 0;
      padding: 10px 13px; color: #111; font-size: 14px; width: 100%;
      outline: none; -webkit-appearance: none; font-family: inherit;
    }
    input:not([type="checkbox"]):focus, select:focus { border-color: #111; background: #c8c8c8; }
    input::placeholder { color: #888; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; cursor: pointer; user-select: none; }

    /* ── 저장 버튼 ── */
    #btn-save {
      background: var(--lime); border: 1px solid #111; border-radius: 0; padding: 13px;
      color: #111; font-weight: 700; font-size: 12px; letter-spacing: 0.14em;
      cursor: pointer; width: 100%; margin-top: 4px; font-family: inherit;
    }
    #btn-save:active { opacity: 0.8; }

    /* ── 내역 아이템 ── */
    .record-wrap { background: #cccccc; border-bottom: 0.5px solid #aaa; padding: 0 16px; margin-bottom: 1px; }
    .record-item { padding: 13px 0; border-bottom: 0.5px solid #bbb; display: flex; justify-content: space-between; gap: 10px; }
    .record-item:last-child { border-bottom: none; }
    .record-left { flex: 1; min-width: 0; }
    .record-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
    .badge { font-size: 10px; letter-spacing: 0.08em; padding: 2px 8px; font-weight: 500; border: 0.5px solid #999; }
    .badge-cat { color: #555; }
    .badge-warn { border-color: #c00; color: #c00; }
    /* ✅ 추가: 영수증 첨부 뱃지 */
    .badge-ok { border-color: #072BBB; color: #072BBB; }
    .record-name { font-size: 14px; font-weight: 600; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .record-memo { font-size: 12px; color: #777; margin-top: 3px; }
    .record-date { font-size: 11px; letter-spacing: 0.08em; color: #888; margin-top: 3px; }
    .record-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .record-amount { font-size: 14px; font-weight: 600; color: #c00; }
    .btn-del { background: transparent; border: 0.5px solid #999; padding: 4px 9px; color: #888; font-size: 11px; cursor: pointer; font-family: inherit; }

    /* ── 한도 탭 ── */
    .limit-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 0.5px solid #bbb; font-size: 13px; color: #111; }
    .limit-row:last-child { border-bottom: none; }
    .limit-val { color: #555; font-weight: 500; font-size: 12px; }
    .limit-val.none { color: #999; }
    .nodata { text-align: center; color: #888; padding: 50px 0; font-size: 13px; letter-spacing: 0.06em; line-height: 2; }
    .warn-box { border: 0.5px solid #aaa; padding: 11px 12px; font-size: 12px; color: #777; margin-top: 12px; line-height: 1.7; }
    .no-item { color: #c00; display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 8px; letter-spacing: 0.04em; }

    @keyframes slideDown { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
    ::-webkit-scrollbar { width: 2px; height: 2px; }
    ::-webkit-scrollbar-thumb { background: #aaa; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-top">
      <div>
        <div class="header-logo">JOBLOG</div>
        <div class="header-sub">2026 SEJONG YOUTH</div>
      </div>
      <button id="btn-add" onclick="toggleForm()">+ ADD</button>
    </div>
    <div class="month-tabs" id="month-tabs"></div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('dashboard',this)">OVERVIEW</button>
      <button class="tab-btn" onclick="setTab('history',this)">RECORDS</button>
      <button class="tab-btn" onclick="setTab('limits',this)">LIMITS</button>
    </div>
  </div>
  <div id="scroll-body">
    <div id="form-wrap" style="display:none"></div>
    <div id="view-dashboard"></div>
    <div id="view-history" style="display:none"></div>
    <div id="view-limits" style="display:none"></div>
  </div>
</div>

<script>
const MONTHS = ['5월','6월','7월','8월','9월','10월'];
const MONTH_LABELS = {'5월':'MAY','6월':'JUN','7월':'JUL','8월':'AUG','9월':'SEP','10월':'OCT'};
const MONTH_BUDGET = 500000;
const STORAGE_KEY = 'sjyouth_v2';

const MONTHLY_LIMITS = {
  '교육비': null,
  '자격증 접수비': null,
  '교재·도서비': 100000,
  '사무용품비': 50000,
  '면접 지원': 50000,
  '교통비': 100000,
  '통신비': 50000,
  '식비': 200000,
  '건강관리(헬스 등)': 50000,
  '문화비': 50000,
};
const PERIOD_LIMITS = {
  '전자기기': 1000000,
  '건강관리(렌즈·안경)': 200000,
  '건강검진': 300000,
};
const ALL_CATS = [...Object.keys(MONTHLY_LIMITS), ...Object.keys(PERIOD_LIMITS)];
const BLOCKED = ['음주·담배','입시학원','국제항공·선박료','대학등록금·학점은행제','일반진료비·의약품','잡지·만화·음반','PC방·게임방','당구장·볼링장 등 레저'];

let state = { records: [], currentMonth: '5월', tab: 'dashboard', formOpen: false };
let editId = null;

function load() {
  try { const d = JSON.parse(localStorage.getItem(STORAGE_KEY)); if (d) state.records = d.records || []; } catch {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ records: state.records })); } catch {}
}

const fmt = n => n.toLocaleString('ko-KR') + '원';
const pct = (used, lim) => lim ? Math.min(100, Math.round(used / lim * 100)) : 0;
const barClass = p => p >= 90 ? 'over' : p >= 70 ? 'warn' : '';

function getMonthRecords(m) { return state.records.filter(r => r.month === m); }
function getMonthTotal(m) { return getMonthRecords(m).reduce((s,r) => s+r.amount, 0); }
function getCatUsage(records) {
  const u = {};
  records.forEach(r => u[r.category] = (u[r.category]||0) + r.amount);
  return u;
}

function renderMonthTabs() {
  document.getElementById('month-tabs').innerHTML = MONTHS.map(m =>
    `<button class="month-btn${m===state.currentMonth?' active':''}" onclick="setMonth('${m}')">${MONTH_LABELS[m]}</button>`
  ).join('');
}

function toggleForm() {
  state.formOpen = !state.formOpen;

  if (!state.formOpen) editId = null;
  const btn = document.getElementById('btn-add');
  btn.textContent = state.formOpen ? '✕ CLOSE' : '+ ADD';
  btn.className = state.formOpen ? 'open' : '';
  renderForm();
}

function renderForm() {
  const el = document.getElementById('form-wrap');
  if (!state.formOpen) { el.style.display = 'none'; return; }
  const editing = editId !== null ? state.records.find(r => r.id === editId) : null;
  const rc = editing ? editing.receipt : false;
  el._receipt = rc;
  el.style.display = 'block';
  el.innerHTML = `
    <h2>${editing ? 'EDIT RECORD' : 'RECORD EXPENSE'}</h2>
    <div class="form-grid">
      <input id="f-name" placeholder="지출명 (예: 정보처리기사 접수비)" value="${editing ? editing.name : ''}" />
      <div class="form-row">
        <select id="f-cat" style="flex:1">${ALL_CATS.map(c=>`<option value="${c}"${editing&&editing.category===c?' selected':''}>${c}</option>`).join('')}</select>
        <select id="f-month" style="width:90px">${MONTHS.map(m=>`<option value="${m}"${(editing?editing.month:state.currentMonth)===m?' selected':''}>${MONTH_LABELS[m]}</option>`).join('')}</select>
      </div>
      <input id="f-amount" type="number" inputmode="numeric" placeholder="금액 (숫자만)" value="${editing ? editing.amount : ''}" />
      <input id="f-memo" placeholder="메모 (선택)" value="${editing ? editing.memo : ''}" />
      <div class="checkbox-row" onclick="toggleReceipt()">
        <div id="receipt-box" style="width:16px;height:16px;border:1px solid ${rc?'#072BBB':'#999'};background:${rc?'#072BBB':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;">${rc?'<span style="color:#fff;font-size:10px;line-height:1;">✓</span>':''}</div>
        <span id="receipt-label" style="color:${rc?'#072BBB':'#666'};">영수증 첨부 완료</span>
      </div>
      <button id="btn-save" onclick="saveRecord()">SAVE</button>
    </div>`;
}

function toggleReceipt() {
  const el = document.getElementById('form-wrap');
  el._receipt = !el._receipt;
  const c = el._receipt;
  const box = document.getElementById('receipt-box');
  box.style.border = `1px solid ${c ? '#072BBB' : '#999'}`;
  box.style.background = c ? '#072BBB' : 'transparent';
  box.innerHTML = c ? '<span style="color:#fff;font-size:10px;line-height:1;">✓</span>' : '';
  document.getElementById('receipt-label').style.color = c ? '#072BBB' : '#666';
}

function saveRecord() {
  const name = document.getElementById('f-name').value.trim();
  const amount = parseInt(document.getElementById('f-amount').value, 10);
  if (!name || !amount || amount <= 0) { alert('지출명과 금액을 입력해주세요.'); return; }
  const el = document.getElementById('form-wrap');
  const receipt = el._receipt || false;
  const cat = document.getElementById('f-cat').value;
  const selectedMonth = MONTHS[document.getElementById('f-month').selectedIndex];
  const memo = document.getElementById('f-memo').value.trim();

  if (editId !== null) {
    // 기존 내역 수정
    const idx = state.records.findIndex(r => r.id === editId);
    if (idx !== -1) state.records[idx] = { ...state.records[idx], name, category: cat, amount, month: selectedMonth, memo, receipt };
    editId = null;
  } else {
    // 신규 추가
    gtag('event', 'add_record', { event_category: 'conversion', event_label: '지출저장완료', value: amount, currency: 'KRW', item_category: cat });
    state.records.unshift({ id: Date.now(), name, category: cat, amount, month: selectedMonth, memo, receipt, date: new Date().toLocaleDateString('ko-KR') });
  }
  save();
  state.formOpen = false;
  document.getElementById('btn-add').textContent = '+ ADD';
  document.getElementById('btn-add').className = '';
  renderForm();
  renderAll();
}

function deleteRecord(id) {
  if (!confirm('삭제할까요?')) return;
  gtag('event', 'delete_record', { event_category: 'usage', event_label: '지출내역삭제', method: 'manual_delete' });
  state.records = state.records.filter(r => r.id !== id);
  save(); renderAll();
}

// ✅ 추가: 편집 진입
function editRecord(id) {
  editId = id;
  state.formOpen = true;
  document.getElementById('btn-add').textContent = '✕ CLOSE';
  document.getElementById('btn-add').className = 'open';
  renderForm();
  document.getElementById('scroll-body').scrollTo({ top: 0, behavior: 'smooth' });
}

function setTab(tab, btn) {
  state.tab = tab;
  gtag('event', 'tab_view', { tab_name: tab });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['dashboard','history','limits'].forEach(t => {
    document.getElementById('view-'+t).style.display = t===tab ? 'block' : 'none';
  });
  renderTab();
}

function setMonth(m) {
  state.currentMonth = m;
  renderMonthTabs();
  renderTab();
}

function renderTab() {
  if (state.tab === 'dashboard') renderDashboard();
  else if (state.tab === 'history') renderHistory();
  else renderLimits();
}

function renderDashboard() {
  const m = state.currentMonth;
  const recs = getMonthRecords(m);
  const used = getMonthTotal(m);
  const remain = MONTH_BUDGET - used;
  const p = pct(used, MONTH_BUDGET);
  const catUsage = getCatUsage(recs);
  const allUsage = getCatUsage(state.records);
  const bc = barClass(p);
  const remainClass = remain < 0 ? 'over' : remain < 100000 ? 'warn' : '';

  let catBarsHtml = Object.entries(MONTHLY_LIMITS).map(([cat, lim]) => {
    const u = catUsage[cat] || 0;
    const cp = pct(u, lim);
    const bc2 = barClass(cp);
    return `<div class="cat-row">
      <div class="cat-meta">
        <span>${cat}</span>
        <span class="cat-limit${lim&&cp>=90?' danger':''}">${fmt(u)}${lim?' / '+fmt(lim):''}</span>
      </div>
      ${lim ? `<div class="cat-bar-bg"><div class="cat-bar-fill ${bc2}" style="width:${cp}%"></div></div>` : ''}
    </div>`;
  }).join('');

  let periodBarsHtml = Object.entries(PERIOD_LIMITS).map(([cat, lim]) => {
    const u = allUsage[cat] || 0;
    if (u === 0) return '';
    const cp = pct(u, lim);
    return `<div class="cat-row">
      <div class="cat-meta">
        <span>${cat} <span style="font-size:10px;color:#888;margin-left:3px">기간전체</span></span>
        <span class="cat-limit${cp>=90?' danger':''}">${fmt(u)} / ${fmt(lim)}</span>
      </div>
      <div class="cat-bar-bg"><div class="cat-bar-fill ${barClass(cp)}" style="width:${cp}%"></div></div>
    </div>`;
  }).join('');

  document.getElementById('view-dashboard').innerHTML = `
    <div class="card">
      <div class="budget-row">
        <div>
          <div class="budget-label">${MONTH_LABELS[m]} — BUDGET</div>
          <div class="budget-amount">${fmt(MONTH_BUDGET)}</div>
        </div>
        <div>
          <div class="remain-label">REMAINING</div>
          <div class="remain-amount ${remainClass}">${remain<0?'-':''}${fmt(Math.abs(remain))}</div>
        </div>
      </div>
      <div class="progress-meta"><span>USED ${fmt(used)}</span><span>${p}%</span></div>
      <div class="progress-bg"><div class="progress-fill ${bc}" style="width:${p}%"></div></div>
    </div>
    <div class="card">
      <div class="card-title">${MONTH_LABELS[m]} — BY CATEGORY</div>
      ${catBarsHtml}${periodBarsHtml}
      ${recs.length===0 ? '<div class="nodata">NO RECORDS YET<br><span style="font-size:11px;color:#aaa">+ ADD 버튼으로 시작하세요</span></div>' : ''}
    </div>`;
}

function renderHistory() {
  const recs = getMonthRecords(state.currentMonth);
  if (recs.length === 0) {
    document.getElementById('view-history').innerHTML =
      `<div class="card"><div class="nodata">NO RECORDS FOR ${MONTH_LABELS[state.currentMonth]}</div></div>`;
    return;
  }
  document.getElementById('view-history').innerHTML =
    `<div class="record-wrap">` +
    recs.map(r => `
      <div class="record-item">
        <div class="record-left">
          <div class="record-badges">
            <span class="badge badge-cat">${r.category}</span>
            ${r.receipt
              ? '<span class="badge badge-ok">환급 신청</span>'
              : '<span class="badge badge-warn">환급 미신청</span>'}
          </div>
          <div class="record-name">${r.name}</div>
          ${r.memo ? `<div class="record-memo">${r.memo}</div>` : ''}
          <div class="record-date">${r.date}</div>
        </div>
        <div class="record-right">
          <div class="record-amount">−${fmt(r.amount)}</div>
          <div style="display:flex;gap:5px;">
            <button class="btn-del" onclick="editRecord(${r.id})">EDIT</button>
            <button class="btn-del" onclick="deleteRecord(${r.id})">DEL</button>
          </div>
        </div>
      </div>`).join('') +
    `</div>`;
}

function renderLimits() {
  const monthRows = Object.entries(MONTHLY_LIMITS).map(([cat, lim]) =>
    `<div class="limit-row">
      <span>${cat}</span>
      <span class="limit-val ${lim?'':'none'}">${lim ? '월 '+fmt(lim) : '—'}</span>
    </div>`).join('');

  const periodRows = Object.entries(PERIOD_LIMITS).map(([cat, lim]) =>
    `<div class="limit-row">
      <span>${cat}</span>
      <span class="limit-val">${fmt(lim)}</span>
    </div>`).join('');

  const blockedRows = BLOCKED.map(item =>
    `<div class="no-item"><span>✕</span>${item}</div>`).join('');

  document.getElementById('view-limits').innerHTML = `
    <div class="card">
      <div class="card-title">MONTHLY LIMITS</div>${monthRows}
    </div>
    <div class="card">
      <div class="card-title">PERIOD LIMITS</div>${periodRows}
    </div>
    <div class="card">
      <div class="card-title">NOT COVERED</div>
      <div style="display:flex;flex-direction:column;">${blockedRows}</div>
      <div class="warn-box"> 식비·건강관리비·문화비 오프라인 결제는 세종시 관내 사업장만 인정</div>
    </div>`;
}

function renderAll() {
  renderMonthTabs();
  renderDashboard();
}

load();
renderAll();

if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'joblog-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['.'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
</script>
